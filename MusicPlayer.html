<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Katsiga Music player </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="MusicPlayer.css">
</head>
<body class="bg-zinc-950 text-white min-h-screen flex items-center justify-center p-4">

    <div class="main-container flex flex-col md:flex-row gap-6 bg-zinc-900/50 p-6 rounded-3xl border border-white/10 backdrop-blur-xl shadow-2xl max-w-4xl w-full">
        
        <div class="flex-1 flex flex-col items-center text-center">
            <div class="relative group">
                <div id="album-art" class="w-64 h-64 rounded-2xl bg-gradient-to-tr from-purple-500 to-pink-500 shadow-2xl mb-6 overflow-hidden border-4 border-white/5">
                    <img id="track-art" src="https://via.placeholder.com/300" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
                </div>
            </div>

            <h2 id="track-title" class="text-2xl font-bold truncate w-full">Song Title</h2>
            <p id="track-artist" class="text-zinc-400 mb-6">Artist Name</p>

            <div class="w-full mb-6">
                <input type="range" id="progress-bar" min="0" max="100" value="0" class="w-full h-1 bg-zinc-700 rounded-lg appearance-none cursor-pointer accent-purple-500">
                <div class="flex justify-between text-xs mt-2 text-zinc-500">
                    <span id="current-time">0:00</span>
                    <span id="duration-time">0:00</span>
                </div>
            </div>

            <div class="flex items-center gap-8 mb-8">
                <button id="prev" class="text-2xl hover:text-purple-400 transition"><i class="fas fa-step-backward"></i></button>
                <button id="play-pause" class="w-16 h-16 bg-white text-black rounded-full flex items-center justify-center text-2xl hover:scale-105 transition active:scale-95 shadow-lg shadow-white/10">
                    <i class="fas fa-play" id="play-icon"></i>
                </button>
                <button id="next" class="text-2xl hover:text-purple-400 transition"><i class="fas fa-step-forward"></i></button>
            </div>

            <div class="flex items-center gap-3 w-32">
                <i class="fas fa-volume-low text-zinc-500"></i>
                <input type="range" id="volume-slider" min="0" max="100" value="80" class="w-full h-1 bg-zinc-700 rounded-lg appearance-none cursor-pointer accent-white">
            </div>
        </div>

        <div class="md:w-72 border-t md:border-t-0 md:border-l border-white/10 pt-6 md:pt-0 md:pl-6">
            <h3 class="font-bold mb-4 text-purple-400 uppercase tracking-widest text-sm">Up Next</h3>
            <div id="playlist" class="space-y-2 overflow-y-auto max-h-80 pr-2 custom-scrollbar">
                </div>
        </div>
    </div>

    <audio id="audio-player"></audio>
    <script src="MusicPlayer.js"></script>
</body>
</html>
