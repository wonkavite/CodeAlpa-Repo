<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Katsiga Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="CodeAlphaGalley.css">
</head>
<body class="bg-slate-900 text-white min-h-screen p-8">

    <div class="max-w-6xl mx-auto">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-bold mb-4 bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">
                Digital Arts Collective
            </h1>
            <div id="filter-buttons" class="flex flex-wrap justify-center gap-4 mt-6">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="nature">Nature</button>
                <button class="filter-btn" data-filter="abstract">Abstract</button>
                <button class="filter-btn" data-filter="urban">Urban</button>
            </div>
        </header>

        <div id="gallery-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>

        <div class="flex justify-center items-center gap-8 mt-12">
            <button id="prev-btn" class="nav-btn">Previous</button>
            <div id="page-dots" class="flex gap-2"></div>
            <button id="next-btn" class="nav-btn">Next</button>
        </div>
    </div>

    <script src="CodeAlphaGalley.js"></script>
</body>
</html>
